<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Casino Server</title>

<style>
    /* 🔥 고정 배경 설정 */
    html {
        background: linear-gradient(180deg, #2e2e2e 0%, #1f1f1f 50%, #151515 100%);
        background-attachment: fixed;
    }

    body {
        margin: 0;
        background: transparent;
        color: #ddd;
        font-family: "Malgun Gothic", Arial, sans-serif;
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.15);
        pointer-events: none;
        z-index: 0;
    }

    /* 푸터 */
    .footer {
        margin-top: 60px;
        padding: 15px 0;
        font-size: 14px;
        color: rgba(230,230,230,0.75);
        text-align: center;
        line-height: 1.4;
    }

    /* 상단 메뉴 (4개로 조정) */
    .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        background: rgba(0,0,0,0.55);
        padding: 14px 0;
        border-bottom: 1px solid rgba(255,0,0,0.25);
        z-index: 999;
        text-align: center;
        backdrop-filter: blur(3px);
    }

    .navbar a {
        color: #ddd;
        /* 메뉴가 4개로 늘어나서 간격을 25px로 소폭 조정했습니다 */
        margin: 0 25px; 
        font-size: 19px;
        font-weight: bold;
        text-decoration: none;
        transition: 0.25s;
    }
    .navbar a:hover {
        color: #ff3333;
        border-bottom: 2px solid #ff3333;
        text-shadow: 0 0 8px #ff0000;
    }

    /* 상단 배너 */
    .header {
        background-image: url('images/megamain.png');
        background-size: cover;
        background-position: center;
        height: 520px;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .header::after {
        content: "";
        position: absolute;
        bottom: -1px;
        width: 100%;
        height: 350px;
        background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.90) 100%);
    }

    .header h1 {
        position: relative;
        font-size: 43px;
        font-weight: bold;
        letter-spacing: 4px;
        color: #fff;
        top: 60px;
        text-shadow: 0 0 10px #000, 0 0 20px #990000;
        z-index: 10;
    }

    /* 본문 컨테이너 */
    .container {
        width: 1000px;
        margin: 120px auto 70px auto;
        text-align: center;
    }

    /* 네모 박스 (중앙 버튼) */
    .img-box {
        width: 100%;
        height: 100px;
        border-radius: 10px;
        margin-bottom: 30px;
        background-size: cover;
        background-position: center;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        border: 1px solid rgba(255,40,40,0.35);
        box-shadow: 0 0 12px rgba(255,0,0,0.25);
        transition: 0.3s;
    }

    .img-box:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(255,0,0,0.55);
        border-color: rgba(255,80,80,0.9);
    }

    .img-box::after {
        content:"";
        position:absolute;
        inset:0;
        background:rgba(0,0,0,0.45);
    }

    .img-box span {
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        color:#fff;
        font-size:22px;
        font-weight:bold;
        z-index:5;
        text-shadow:0 0 8px #000, 0 0 15px #900;
    }

    /* 팝업 */
    #popup {
        width: 420px;
        background: rgba(0,0,0,0.85);
        border: 2px solid #800000;
        box-shadow: 0 0 25px rgba(255,0,0,0.4);
        color: #fff;
        padding: 20px;
        border-radius: 10px;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2000;
        display: none;
    }
    #popup h2 { text-align: center; color: #ff3333; }
    .close-btn { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #ff5555; font-size: 22px; }
</style>
</head>

<body>

window.addEventListener("load", () => { document.getElementById("popup").style.display = "block"; });

</div>

</body>
</html>
