<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mega 서버에 오신것을 환영합니다.</title>

<style>
    /* 🔥 고정 배경 설정 (블랙 & 딥블루 그라데이션으로 변경) */
    html {
        background: linear-gradient(180deg, #1a2636 0%, #111822 50%, #0b0f15 100%);
        background-attachment: fixed;
    }

    body {
        margin: 0;
        background: transparent;
        color: #ddd;
        font-family: "Malgun Gothic", Arial, sans-serif;
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.2);
        pointer-events: none;
        z-index: 0;
    }

    /* 푸터 */
    .footer {
        margin-top: 60px;
        padding: 15px 0;
        font-size: 14px;
        color: rgba(200,220,240,0.7);
        text-align: center;
        line-height: 1.4;
    }

    /* 상단 메뉴 (파란색 테마로 변경) */
    .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        background: rgba(10,16,26,0.65);
        padding: 14px 0;
        border-bottom: 1px solid rgba(0,150,255,0.3);
        z-index: 999;
        text-align: center;
        backdrop-filter: blur(4px);
    }

    .navbar a {
        color: #ddd;
        margin: 0 25px; 
        font-size: 19px;
        font-weight: bold;
        text-decoration: none;
        transition: 0.25s;
    }
    /* 마우스 올렸을 때 네온 블루 효과 */
    .navbar a:hover {
        color: #33ccff;
        border-bottom: 2px solid #33ccff;
        text-shadow: 0 0 10px #0088ff, 0 0 20px #0055ff;
    }

    /* 상단 배너 */
    .header {
        background-image: url('images/megamain.png'); /* 💡 여기에 새로 다운받은 파란 드래곤 이미지를 넣으시면 됩니다! */
        background-size: cover;
        background-position: center;
        height: 520px;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .header::after {
        content: "";
        position: absolute;
        bottom: -1px;
        width: 100%;
        height: 350px;
        background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(11,15,21,0.95) 100%);
    }

    /* 메인 타이틀에 신비로운 푸른색 그림자 추가 */
    .header h1 {
        position: relative;
        font-size: 43px;
        font-weight: bold;
        letter-spacing: 4px;
        color: #fff;
        top: 60px;
        text-shadow: 0 0 15px #000, 0 0 25px #0066ff, 0 0 35px #0033aa;
        z-index: 10;
    }

    /* 본문 컨테이너 */
    .container {
        width: 1000px;
        margin: 120px auto 70px auto;
        text-align: center;
    }

    /* 네모 박스 (중앙 버튼 - 블루 테마로 변경) */
    .img-box {
        width: 100%;
        height: 100px;
        border-radius: 10px;
        margin-bottom: 30px;
        background-size: cover;
        background-position: center;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        border: 1px solid rgba(0,150,255,0.3);
        box-shadow: 0 0 15px rgba(0,100,255,0.15);
        transition: 0.3s;
    }

    /* 마우스 올렸을 때 푸른색으로 발광하는 효과 */
    .img-box:hover {
        transform: scale(1.02);
        box-shadow: 0 0 25px rgba(0,150,255,0.6);
        border-color: rgba(51,204,255,0.9);
    }

    .img-box::after {
        content:"";
        position:absolute;
        inset:0;
        background:rgba(0,10,20,0.5);
    }

    .img-box span {
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        color:#fff;
        font-size:22px;
        font-weight:bold;
        z-index:5;
        text-shadow:0 0 8px #000, 0 0 15px #0066ff;
    }

    /* 공지사항 팝업창도 다크 블루&시안 테마로 통일 */
    #popup {
        width: 420px;
        background: rgba(10,20,30,0.92);
        border: 2px solid #0055cc;
        box-shadow: 0 0 30px rgba(0,100,255,0.5);
        color: #fff;
        padding: 20px;
        border-radius: 10px;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2000;
        display: none;
        backdrop-filter: blur(5px);
    }
    #popup h2 { text-align: center; color: #33ccff; text-shadow: 0 0 10px rgba(0,150,255,0.5); }
    .close-btn { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #33ccff; font-size: 22px; }
    .close-btn:hover { color: #fff; }
</style>
</head>

<body>

<script>
window.addEventListener("load", () => { document.getElementById("popup").style.display = "block"; });
function closePopup() { document.getElementById("popup").style.display = "none"; }
</script>

    <p></p>
    <br>
    <p></p>
    <br>
    <p></p>
     <br>
    <p></p>
</div>

    <a href="download.html">다운로드</a>
    <a href="promo.html">홍보 문구</a>
</div>

<div class="header">
    <h1>Mega Server</h1>
</div>

<div class="container">
    <div class="img-box" onclick="location.href='download.html'"
        style="background-image:url('images/download_bg.jpg');">
        <span>⬇ 클라이언트 다운로드</span>
    </div>

    <div class="img-box" onclick="location.href='service.html'"
        style="background-image:url('images/service_bg.jpg');">

</body>
</html>
