<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mega 서버에 오신것을 환영합니다.</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #0b0f15;
}
/* ------------------------------
   좌측 사이드바 메뉴 스타일
------------------------------ */
.sidebar {
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    box-sizing: border-box;
    position: fixed;
    top: 0;
    left: 0;
    width: 250px;
    height: 100vh;
    background: linear-gradient(180deg, rgba(10,16,26,0.95) 0%, rgba(7,12,20,0.95) 100%);
    border-right: 1px solid rgba(51, 163, 255,0.25);
    z-index: 2000;
    display: flex;
    flex-direction: column;
    box-shadow: 5px 0 25px rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}
.sidebar-logo { box-sizing: border-box; padding: 18px 20px 12px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(51, 163, 255,0.15); }
.sidebar-logo h2 {
    margin: 0;
    color: #fff;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 3px;
    text-shadow: 0 0 15px #0080ff, 0 0 25px #003366;
}
.sidebar-menu { box-sizing: border-box; display: flex;
    flex-direction: column;
    padding: 5px 0;
    flex: 1;
    overflow-y: auto; }
.sidebar-menu a { box-sizing: border-box; color: #ccc;
    padding: 10px 30px;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 15px;
    border-left: 4px solid transparent;
    transition: 0.25s; }
.sidebar-menu a:hover, .sidebar-menu a.active {
    color: #4da6ff;
    background: rgba(51, 163, 255, 0.08);
    border-left: 4px solid #4da6ff;
    text-shadow: 0 0 10px #33b3ff;
}
.sidebar-footer {
    padding: 20px;
    text-align: center;
    font-size: 13px;
    color: #666;
    border-top: 1px solid rgba(255,255,255,0.05);
}
.sidebar-menu::-webkit-scrollbar { display: none !important; }
.sidebar-menu { -ms-overflow-style: none !important; scrollbar-width: none !important; }

/* 우측 콘텐츠 프레임 */
#mainFrame {
    position: absolute;
    top: 0;
    left: 250px;
    width: calc(100% - 250px);
    height: 100%;
    border: none;
}

/* 모바일 반응형 처리 */
@media screen and (max-width: 768px) {
    .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 55px !important;
        flex-direction: row !important;
        align-items: center !important;
        border-right: none !important;
        border-bottom: 1px solid rgba(51, 163, 255,0.3) !important;
        padding: 0 !important;
        background: rgba(10,16,26,0.98) !important;
        z-index: 9999 !important;
    }
    .sidebar-logo {
        padding: 0 15px !important;
        border-bottom: none !important;
        border-right: 1px solid rgba(51, 163, 255,0.2) !important;
        height: 55px !important;
        display: flex !important;
        align-items: center !important;
    }
    .sidebar-logo h2 {
        font-size: 20px !important;
        margin: 0 !important;
        letter-spacing: 2px !important;
    }
    .sidebar-menu {
        flex-direction: row !important;
        padding: 0 !important;
        margin: 0 !important;
        overflow-x: auto !important;
        overflow-y: hidden !important;
        white-space: nowrap !important;
        align-items: center !important;
        height: 55px !important;
    }
    .sidebar-menu a {
        padding: 0 15px !important;
        font-size: 15px !important;
        height: 55px !important;
        display: inline-flex !important;
        align-items: center !important;
        gap: 6px !important;
        border-left: none !important;
        border-bottom: 3px solid transparent !important;
        box-sizing: border-box !important;
    }
    .sidebar-menu a:hover, .sidebar-menu a.active {
        background: rgba(51, 163, 255, 0.1) !important;
        border-left: none !important;
        border-bottom: 3px solid #4da6ff !important;
    }
    .sidebar-footer {
        display: none !important;
    }
    #mainFrame {
        left: 0;
        width: 100%;
        top: 55px;
        height: calc(100% - 55px);
    }
}
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">
        <h2>MEGA</h2>
    </div>
    <div class="sidebar-menu">
        <a href="home.html" target="main-frame" class="active">🏠 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;홈&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</a>
        <a href="notice.html" target="main-frame">📢 공&nbsp;&nbsp;지&nbsp;&nbsp;사&nbsp;&nbsp;항</a>
        <a href="info.html" target="main-frame">📜 서&nbsp;&nbsp;버&nbsp;&nbsp;정&nbsp;&nbsp;보</a>
        <a href="stats.html" target="main-frame">📊 스&nbsp;탯&nbsp;&nbsp;&&nbsp;&nbsp;공&nbsp;식</a>
        <a href="update.html" target="main-frame">⚡ 업&nbsp;&nbsp;데&nbsp;&nbsp;이&nbsp;&nbsp;트</a>
        <a href="boss.html" target="main-frame">💀 보&nbsp;&nbsp;스&nbsp;&nbsp;정&nbsp;&nbsp;보</a>
        <a href="doll.html" target="main-frame">🧸 마&nbsp;&nbsp;법&nbsp;&nbsp;인&nbsp;&nbsp;형</a>
        <a href="maan.html" target="main-frame">👁️ 마&nbsp;&nbsp;안&nbsp;&nbsp;정&nbsp;&nbsp;보</a>
        <a href="item.html" target="main-frame">💎 아&nbsp;이&nbsp;템&nbsp;정&nbsp;보</a>
        <a href="feature.html" target="main-frame">⚙️ 간&nbsp;&nbsp;편&nbsp;&nbsp;기&nbsp;&nbsp;능</a>
        <a href="hunting.html" target="main-frame">🚩 레벨별 사냥터</a>
        <a href="promo.html" target="main-frame">📣 홍&nbsp;&nbsp;보&nbsp;&nbsp;안&nbsp;&nbsp;내</a>
        <a href="service.html" target="main-frame">💬 고&nbsp;&nbsp;객&nbsp;&nbsp;센&nbsp;&nbsp;터</a>
        <a href="security.html" target="main-frame">🛡️ 보안 설정(필수)</a>
        <a href="download.html" target="main-frame">⬇ 다&nbsp;&nbsp;운&nbsp;&nbsp;로&nbsp;&nbsp;드</a>
    </div>
    <div class="sidebar-footer">
        <span>© 2026 Mega Server</span>
    </div>
</div>

<iframe name="main-frame" id="mainFrame" src="home.html"></iframe>

<script>
    function updateActiveMenu(href) {
        const links = document.querySelectorAll('.sidebar-menu a');
        links.forEach(link => {
            const linkHref = link.getAttribute('href');
            if (linkHref === href) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    }

    // iframe 내부의 경로가 변경될 때마다 활성화 상태 싱크
    document.addEventListener("DOMContentLoaded", () => {
        const iframe = document.getElementById("mainFrame");
        iframe.addEventListener("load", () => {
            try {
                const currentPath = iframe.contentWindow.location.pathname.split('/').pop() || 'home.html';
                updateActiveMenu(currentPath);
            } catch (e) {
                // 크로스오리진 에러 무시
            }
        });
    });
</script>

</body>
</html>
