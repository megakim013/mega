}

    /* 화면 전체 어두운 레이어 */
    body::before {

        inset: 0;
        background: rgba(0,0,0,0.22);
    }

        bottom: -1px;
        left: 0;

            rgba(0,0,0,0) 0%,

        line-height: 1.65;

    /* -------------------------

    .site-buttons {
        display: flex;

        justify-content: center;
        gap: 14px;
        margin-top: 25px;
    }

    .site-btn {
        width: 175px;
        padding: 13px 0;
        background: #1b1b1b;
        border: 1px solid #444;
        border-radius: 8px;
        text-align: center;
        font-size: 17px;
        transition: 0.18s;
    }

    .site-btn a {
        color: #e0e0e0;
        text-decoration: none;
    }

    .site-btn:hover {
        background: #2d2d2d;
        border-color: #ff4d4d;
        transform: translateY(-2px);
        box-shadow: 0 0 12px rgba(255, 0, 0, 0.35);
    }

    /* -------------------------
       복사 버튼
    ------------------------- */
    .copy-btn {

        padding: 14px 0;
        background: #202020;
        border: 1px solid #555;
        border-radius: 8px;
        font-size: 18px;
        text-align: center;
        cursor: pointer;
        transition: 0.18s;
    }

    .copy-btn:hover {
        background: #2f2f2f;
        border-color: #ff4d4d;
        box-shadow: 0 0 12px rgba(255,0,0,0.35);
    }

    /* 🔥 홍보글 박스 */

        background: rgba(30, 30, 30, 0.8);
        border: 1px solid rgba(255,0,0,0.3);
        border-radius: 10px;
        line-height: 1.7;
        white-space: pre-line;
        cursor: pointer;
        font-size: 17px;
        color: #eee;
        user-select: none;
    }

    .promo-box:hover {
        background: rgba(40,40,40,0.85);
        box-shadow: 0 0 12px rgba(255,0,0,0.35);
    }

    /* -------------------------
       하단 안내
    ------------------------- */

#adminLoginBar {

}

#adminLoginBar button {

    transition: 0.2s;

#adminLoginBar button:hover {

    box-shadow: 0 0 14px rgba(255,0,0,0.9);

</style>

<script>
/* 🔥 promo.txt 불러오기 */
async function loadPromo() {
    try {
        const res = await fetch("promo.txt?cache=" + Date.now());
        const text = await res.text();
        document.getElementById("promoText").innerText = text;
    } catch (e) {
        document.getElementById("promoText").innerText = "불러오기 실패!";
    }
}
loadPromo();

/* 🔥 클릭 시 전체 선택 */
function selectText(id) {
    const element = document.getElementById(id);
    const range = document.createRange();
    range.selectNodeContents(element);
    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);
}

/* 🔥 복사하기 */
function copyPromo() {
    const text = document.getElementById("promoText").innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert("홍보내용이 복사되었습니다!");
    });
}

/* 관리자 시스템 */
let isAdmin = false;
let githubToken = null;

/* 🔐 관리자 로그인 */
function showAdminLogin() {
    const pw = prompt("관리자 비밀번호를 입력하세요.");
    if (pw === "wjdalsrud1!") {
        alert("관리자 모드 활성화되었습니다.");
        isAdmin = true;
        enableAdminMode();

        githubToken = prompt("GitHub Token을 입력하세요.\n(※ 입력하면 자동 저장 활성화)");
        if (githubToken) {
            document.getElementById("saveGithubBtn").style.display = "inline-block";
        }

    } else {
        alert("비밀번호가 틀렸습니다.");
    }
}

/* 관리자 모드 활성화 */
function enableAdminMode() {
    document.getElementById("adminEditor").style.display = "block";
    document.getElementById("promoEditor").value =
        document.getElementById("promoText").innerText;
}

/* 🔥 화면에 즉시 반영 */
function savePromo() {
    const newText = document.getElementById("promoEditor").value;
    document.getElementById("promoText").innerText = newText;
    alert("화면에 적용되었습니다.\n(GitHub 반영해야 모든 유저가 봅니다)");
}

/* 🔥🔥 GitHub에 저장 */
async function saveToGithub() {
    if (!githubToken) {
        alert("Token 없음! 관리자 로그인 다시 하세요.");
        return;
    }

    const apiUrl = "https://api.github.com/repos/BaphometLin/baphomet-server/contents/promo.txt";
    const newContent = document.getElementById("promoEditor").value;

    // 1) SHA 가져오기
    const getFile = await fetch(apiUrl, {
        headers: { "Authorization": `token ${githubToken}` }
    });
    const fileData = await getFile.json();
    const sha = fileData.sha;

    // 2) 업로드
    const upload = await fetch(apiUrl, {
        method: "PUT",
        headers: {
            "Authorization": `token ${githubToken}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Update promo.txt via web admin",
            content: btoa(unescape(encodeURIComponent(newContent))),
            sha: sha
        })
    });

    if (upload.ok) {
        alert("🎉 GitHub 저장 완료!\n10~30초 후 모든 유저에게 반영됩니다.");
    } else {
        alert("❌ 저장 실패! Token 또는 경로를 확인하세요.");
    }
}
</script>
